# =============================================================================
# nginx.conf — reverse proxy for Interactive UMAP Explorer
#
# Sits in front of gunicorn (listening on 127.0.0.1:8050).
# Provides:
#   - WebSocket upgrade headers (required by Dash hot-reload / callbacks)
#   - Long timeouts for large UMAP rendering
#   - Aggressive caching for static assets
# =============================================================================

upstream dash_app {
    server 127.0.0.1:8050;
}

server {
    listen 80;
    server_name umap.explorer.local;

    # ------------------------------------------------------------------
    # Security headers
    # ------------------------------------------------------------------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws: wss:" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ------------------------------------------------------------------
    # Limits
    # ------------------------------------------------------------------
    client_max_body_size 50M;

    # ------------------------------------------------------------------
    # Main proxy — Dash page requests, callbacks, and WebSocket
    # ------------------------------------------------------------------
    location / {
        proxy_pass http://dash_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ------------------------------------------------------------------
    # Static assets — long-term browser caching
    # ------------------------------------------------------------------
    location /assets/ {
        proxy_pass http://dash_app;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ------------------------------------------------------------------
    # Dash component updates — ensure WebSocket upgrade is honoured
    # ------------------------------------------------------------------
    location /_dash-update-component {
        proxy_pass http://dash_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ------------------------------------------------------------------
    # Dash layout / dependencies
    # ------------------------------------------------------------------
    location /_dash-layout {
        proxy_pass http://dash_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /_dash-dependencies {
        proxy_pass http://dash_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ------------------------------------------------------------------
    # Dash routes API
    # ------------------------------------------------------------------
    location /_pages {
        proxy_pass http://dash_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
